name: Daily Weather Data Collection

on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9 AM UTC
  workflow_dispatch:     # Manual trigger

jobs:
  collect-weather:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip3 install -r requirements.txt

      - name: Run weather contributor agent
        run: |
          cd agents
          python -u contributor.py

      - name: Commit and push weather data
        uses: stefanzweifel/git-auto-commit-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          commit_message: |
            🌍 Daily Weather Data - ${{ github.event.inputs.date || format('YYYY-MM-DD') }}

            - Updated weather for all tracked cities
            - Generated daily summary
            - Auto-committed by GitHub Actions
          file_pattern: |
            data/*
            README.md
          commit_user_name: weather-bot
          commit_user_email: weather-bot@github.com
          commit_author: weather-bot <weather-bot@github.com>